name: Headless Browser Tests

on:
  push:
    branches: [ master, main, 'refactor/**' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  # ============================================
  # Headless Browser Testing with Playwright
  # ============================================
  playwright-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: |
        npm init -y
        npm install @playwright/test
        npx playwright install chromium
        
    - name: Run Playwright tests
      run: |
        cat > playwright.config.js << 'CONFIG'
        module.exports = {
          testDir: './tests',
          use: {
            headless: true,
            browserName: 'chromium',
            screenshot: 'only-on-failure',
            video: 'retain-on-failure',
          },
        };
        CONFIG
        
        mkdir -p tests
        
        cat > tests/e2e.spec.js << 'TEST'
        const { test, expect } = require('@playwright/test');
        const http = require('http');
        const fs = require('fs');
        const path = require('path');
        
        // Start static server before tests
        let server;
        
        test.beforeAll(async () => {
          server = http.createServer((req, res) => {
            let filePath = '.' + req.url;
            if (filePath === './') filePath = './index.html';
            
            const extname = String(path.extname(filePath)).toLowerCase();
            const mimeTypes = {
              '.html': 'text/html',
              '.js': 'text/javascript',
              '.css': 'text/css',
            };
            
            const contentType = mimeTypes[extname] || 'application/octet-stream';
            
            fs.readFile(filePath, (error, content) => {
              if (error) {
                res.writeHead(404);
                res.end('Not Found');
              } else {
                res.writeHead(200, { 'Content-Type': contentType });
                res.end(content, 'utf-8');
              }
            });
          });
          
          await new Promise((resolve) => server.listen(8000, resolve));
          console.log('Test server started on port 8000');
        });
        
        test.afterAll(async () => {
          if (server) {
            await new Promise((resolve) => server.close(resolve));
          }
        });
        
        // ============================================
        // Homepage Tests
        // ============================================
        test.describe('Homepage', () => {
          test('homepage loads with correct title', async ({ page }) => {
            await page.goto('http://localhost:8000/');
            await expect(page).toHaveTitle(/Super Minds/);
          });
          
          test('homepage has navigation links', async ({ page }) => {
            await page.goto('http://localhost:8000/');
            const unit7Link = page.locator('a[href="unit7/index.html"]').first();
            await expect(unit7Link).toBeVisible();
          });
          
          test('shared CSS is loaded', async ({ page }) => {
            await page.goto('http://localhost:8000/');
            const cssLink = page.locator('link[href*="common.css"]');
            await expect(cssLink).toHaveAttribute('rel', 'stylesheet');
          });
          
          test('page has gradient background', async ({ page }) => {
            await page.goto('http://localhost:8000/');
            const body = page.locator('body');
            const hasGradient = await body.evaluate(el => {
              const style = window.getComputedStyle(el);
              return style.background.includes('gradient') || 
                     style.backgroundImage.includes('gradient');
            });
            expect(hasGradient).toBeTruthy();
          });
        });
        
        // ============================================
        // Unit 7 Tests
        // ============================================
        test.describe('Unit 7', () => {
          test('Unit 7 page loads', async ({ page }) => {
            await page.goto('http://localhost:8000/unit7/index.html');
            await expect(page).toHaveTitle(/Unit 7|现在进行时/);
          });
          
          test('shared JavaScript is loaded', async ({ page }) => {
            await page.goto('http://localhost:8000/unit7/index.html');
            const hasToggle = await page.evaluate(() => typeof toggleMobileMenu === 'function');
            expect(hasToggle).toBeTruthy();
          });
          
          test('quiz items are clickable', async ({ page }) => {
            await page.goto('http://localhost:8000/unit7/index.html');
            const quizItem = page.locator('.quiz-item').first();
            await expect(quizItem).toBeVisible();
            await quizItem.click();
            const answer = quizItem.locator('.quiz-answer');
            await expect(answer).toHaveClass(/show/);
          });
          
          test('mobile menu button exists', async ({ page }) => {
            await page.goto('http://localhost:8000/unit7/index.html');
            // Set mobile viewport
            await page.setViewportSize({ width: 375, height: 667 });
            const menuButton = page.locator('button[onclick="toggleMobileMenu()"], button[aria-label*="navigation"]').first();
            await expect(menuButton).toBeVisible();
          });
        });
        
        // ============================================
        // Homework Page Tests
        // ============================================
        test.describe('Homework Page', () => {
          test('homework page loads', async ({ page }) => {
            await page.goto('http://localhost:8000/unit7/homework.html');
            await expect(page).toHaveTitle(/Homework|作业/);
          });
          
          test('progress tracking functions exist', async ({ page }) => {
            await page.goto('http://localhost:8000/unit7/homework.html');
            const hasUpdateProgress = await page.evaluate(() => typeof updateProgress === 'function');
            const hasToggleComplete = await page.evaluate(() => typeof toggleComplete === 'function');
            expect(hasUpdateProgress).toBeTruthy();
            expect(hasToggleComplete).toBeTruthy();
          });
          
          test('checkboxes are interactive', async ({ page }) => {
            await page.goto('http://localhost:8000/unit7/homework.html');
            const checkbox = page.locator('input[type="checkbox"]').first();
            await expect(checkbox).toBeVisible();
            await checkbox.check();
            await expect(checkbox).toBeChecked();
          });
          
          test('answer masks toggle on click', async ({ page }) => {
            await page.goto('http://localhost:8000/unit7/homework.html');
            const answerMask = page.locator('.answer-mask').first();
            // Use force: true because answer-mask elements have color:transparent by default
            await answerMask.click({ force: true });
            await expect(answerMask).toHaveClass(/revealed/);
          });
          
          test('flashcards flip on click', async ({ page }) => {
            await page.goto('http://localhost:8000/unit7/homework.html');
            const flashcard = page.locator('.flashcard').first();
            await expect(flashcard).toBeVisible();
            await flashcard.click();
            await expect(flashcard).toHaveClass(/flipped/);
          });
        });
        
        // ============================================
        // Cross-page Navigation Tests
        // ============================================
        test.describe('Navigation', () => {
          test('can navigate from home to Unit 7', async ({ page }) => {
            await page.goto('http://localhost:8000/');
            await page.click('a[href="unit7/index.html"]');
            await expect(page).toHaveURL(/unit7\/index\.html/);
          });
          
          test('can navigate from Unit 7 to Homework', async ({ page }) => {
            await page.goto('http://localhost:8000/unit7/index.html');
            await page.click('a[href="homework.html"]');
            await expect(page).toHaveURL(/homework\.html/);
          });
          
          test('navigation links work in mobile menu', async ({ page }) => {
            await page.goto('http://localhost:8000/unit7/index.html');
            await page.setViewportSize({ width: 375, height: 667 });
            
            // Open mobile menu
            await page.locator('button[onclick="toggleMobileMenu()"], button[aria-label*="navigation"]').first().click();
            
            // Click a link in mobile menu
            await page.click('#mobileMenu a[href="../index.html"]');
            const url = page.url();
            expect(url).toMatch(/http:\/\/localhost:8000\/(index\.html)?$/);
          });
        });
        
        // ============================================
        // Responsive Design Tests
        // ============================================
        test.describe('Responsive Design', () => {
          test('page adapts to mobile viewport', async ({ page }) => {
            await page.goto('http://localhost:8000/');
            await page.setViewportSize({ width: 375, height: 667 });
            
            // Check that content is still visible
            const main = page.locator('main');
            await expect(main).toBeVisible();
            
            // Check for mobile-specific elements
            const mobileMenu = page.locator('#mobileMenu, .md\\:hidden');
            await expect(mobileMenu.first()).toBeAttached();
          });
          
          test('page adapts to desktop viewport', async ({ page }) => {
            await page.goto('http://localhost:8000/');
            await page.setViewportSize({ width: 1280, height: 720 });
            
            // Desktop navigation should be visible
            const desktopNav = page.locator('nav .hidden.md\\:flex, nav .md\\:flex');
            await expect(desktopNav.first()).toBeVisible();
          });
        });
        TEST
        
        npx playwright test tests/e2e.spec.js --reporter=list
        
    - name: Upload test artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-artifacts
        path: |
          test-results/
          playwright-report/
        retention-days: 7
        
    - name: Test Summary
      run: |
        echo "========================================"
        echo "    Headless Browser Tests Complete"
        echo "========================================"

  # ============================================
  # Lighthouse CI for Performance
  # ============================================
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Lighthouse CI
      run: |
        npm install -g @lhci/cli
        
    - name: Run Lighthouse CI
      run: |
        # Create config
        cat > lighthouserc.json << 'CONFIG'
        {
          "ci": {
            "collect": {
              "staticDistDir": ".",
              "url": ["http://localhost:8000/index.html"],
              "startServerCommand": "python3 -m http.server 8000"
            },
            "assert": {
              "preset": "lighthouse:recommended",
              "assertions": {
                "categories:performance": ["warn", {"minScore": 0.8}],
                "categories:accessibility": ["error", {"minScore": 0.9}],
                "categories:best-practices": ["warn", {"minScore": 0.8}]
              }
            }
          }
        }
        CONFIG
        
        # Run Lighthouse (continue on error for initial setup)
        lhci autorun || echo "Lighthouse check completed with warnings"
        
    - name: Upload Lighthouse Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lighthouse-report
        path: '.lighthouseci/'
        retention-days: 7

  # ============================================
  # Visual Regression Testing
  # ============================================
  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Puppeteer
      run: |
        npm install puppeteer pixelmatch pngjs
        
    - name: Capture Screenshots
      run: |
        cat > screenshot-test.js << 'TEST'
        const puppeteer = require('puppeteer');
        const http = require('http');
        const fs = require('fs');
        const path = require('path');
        
        // Start server
        const server = http.createServer((req, res) => {
          let filePath = '.' + req.url;
          if (filePath === './') filePath = './index.html';
          
          fs.readFile(filePath, (error, content) => {
            if (error) {
              res.writeHead(404);
              res.end('Not Found');
            } else {
              res.writeHead(200, { 'Content-Type': 'text/html' });
              res.end(content);
            }
          });
        });
        
        async function captureScreenshots() {
          await new Promise(resolve => server.listen(8000, resolve));
          console.log('Server started');
          
          const browser = await puppeteer.launch({
            headless: 'new',
            args: ['--no-sandbox', '--disable-setuid-sandbox']
          });
          
          // Helper function for delay
          const delay = ms => new Promise(resolve => setTimeout(resolve, ms));
          
          const pages = [
            { url: 'http://localhost:8000/', name: 'homepage' },
            { url: 'http://localhost:8000/unit7/index.html', name: 'unit7' },
            { url: 'http://localhost:8000/unit7/homework.html', name: 'homework' },
          ];
          
          // Desktop screenshots
          for (const { url, name } of pages) {
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 720 });
            await page.goto(url, { waitUntil: 'networkidle0' });
            await delay(2000); // Wait for animations
            await page.screenshot({ path: `screenshot-${name}-desktop.png`, fullPage: true });
            console.log(`✅ Screenshot: ${name} (desktop)`);
            await page.close();
          }
          
          // Mobile screenshots
          for (const { url, name } of pages) {
            const page = await browser.newPage();
            await page.setViewport({ width: 375, height: 667 });
            await page.goto(url, { waitUntil: 'networkidle0' });
            await delay(2000); // Wait for animations
            await page.screenshot({ path: `screenshot-${name}-mobile.png`, fullPage: true });
            console.log(`✅ Screenshot: ${name} (mobile)`);
            await page.close();
          }
          
          await browser.close();
          server.close();
          console.log('Screenshots captured successfully');
        }
        
        captureScreenshots().catch(console.error);
        TEST
        
        node screenshot-test.js
        
    - name: Upload Screenshots
      uses: actions/upload-artifact@v4
      with:
        name: visual-snapshots
        path: 'screenshot-*.png'
        retention-days: 7
